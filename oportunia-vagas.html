  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .jobs-empty { text-align: center; padding: 4rem; color: var(--ink-3); grid-column: 1/-1; }

  /* PAGINAÇÃO */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 0.4rem; margin-top: 2.5rem; flex-wrap: wrap; }
  .pag-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .pag-btn:hover { border-color: var(--ink); color: var(--ink); }
  .pag-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .pag-btn:disabled { opacity: 0.35; cursor: default; }
  .pag-btn.pag-arrow { font-size: 1rem; }

  /* CHIPS ÁREA */
  .area-chips { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; margin-top: 1rem; }
  .area-chips::-webkit-scrollbar { display: none; }

  .area-chip:hover, .area-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  /* ACTIVE FILTERS */
  .active-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .active-filter-tag { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--accent-light); border: 1px solid rgba(232,68,10,0.2); color: var(--accent); padding: 0.25rem 0.75rem; border-radius: var(--radius-pill); font-size: 0.8rem; font-weight: 500; }
  .active-filter-tag button { border: none; background: none; cursor: pointer; color: var(--accent); font-size: 0.9rem; padding: 0; line-height: 1; }
  footer { background: var(--ink); color: rgba(255,255,255,0.5); padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }

<script>
const SUPABASE_URL = 'https://lvexahtskdhgujwrlkex.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AvhhaT_r4vsz3iuiZpZ3AA_zW7rxPo4';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const PER_PAGE = 20;
let paginaAtual = 1;
let todasVagas = [];
let vagasFiltradas = [];

// Lê params da URL (vindos da home via chip de área)
function lerUrlParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('area')) document.getElementById('f-area').value = params.get('area');
  if (params.get('busca')) document.getElementById('busca-input').value = params.get('busca');
  if (params.get('contrato')) document.getElementById('f-contrato').value = params.get('contrato');
  if (params.get('modalidade')) document.getElementById('f-modalidade').value = params.get('modalidade');
}

async function carregarVagas() {
  const grid = document.getElementById('jobs-grid');
  grid.innerHTML = '<div class="jobs-loading">Carregando vagas…</div>';

  const { data, error } = await sb.from('vagas')
    .select('*, empresas(nome, logo)')
    .eq('status', 'ativa')
    .order('destaque', { ascending: false })
    .order('created_at', { ascending: false });

  if (error || !data) {
    grid.innerHTML = '<div class="jobs-empty"><p>⚠️</p><h3>Erro ao carregar vagas</h3><p>Tente novamente mais tarde.</p></div>';
    return;
  }

  todasVagas = data;
  popularCidades(data);
  popularEmpresas(data);
  aplicarFiltros();
}

function popularCidades(vagas) {
  const cidadeEl = document.getElementById('f-cidade');
  const temRemoto = vagas.some(v => v.modalidade === 'Remoto');
  
  // Pega cidades únicas das vagas, excluindo vazias
  const cidades = [...new Set(vagas.map(v => v.cidade).filter(Boolean))].sort();
  
  cidadeEl.innerHTML = '<option value="">Cidade</option>';
  cidades.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    cidadeEl.appendChild(opt);
  });
  
  if (temRemoto) {
    const opt = document.createElement('option');
    opt.value = 'Remoto';
    opt.textContent = 'Remoto';
    cidadeEl.appendChild(opt);
  }
}

function popularEmpresas(vagas) {
  const empresaEl = document.getElementById('f-empresa');
  const empresas = [...new Set(vagas.map(v => v.empresas?.nome).filter(Boolean))].sort();
  empresaEl.innerHTML = '<option value="">Empresa</option>';
  empresas.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e;
    opt.textContent = e;
    empresaEl.appendChild(opt);
  });
}

function buscar() {
  paginaAtual = 1;
  aplicarFiltros();
}

function limparFiltros() {
  document.getElementById('busca-input').value = '';
  document.getElementById('f-area').value = '';
  document.getElementById('f-contrato').value = '';
  document.getElementById('f-modalidade').value = '';
  document.getElementById('f-nivel').value = '';
  document.getElementById('f-cidade').value = '';
  document.getElementById('f-empresa').value = '';
  document.getElementById('f-salario').value = '';
  document.getElementById('f-ordem').value = 'destaque';
  paginaAtual = 1;
  aplicarFiltros();
}

function aplicarFiltros() {
  const busca = document.getElementById('busca-input').value.trim().toLowerCase();
  const area = document.getElementById('f-area').value;
  const contrato = document.getElementById('f-contrato').value;
  const modalidade = document.getElementById('f-modalidade').value;
  const nivel = document.getElementById('f-nivel').value;
  const cidade = document.getElementById('f-cidade').value;
  const salarioMin = parseInt(document.getElementById('f-salario').value) || 0;
  const empresa = document.getElementById('f-empresa').value;
  const ordem = document.getElementById('f-ordem').value;

  let resultado = todasVagas.filter(v => {
    if (busca && !v.titulo?.toLowerCase().includes(busca) && !v.area?.toLowerCase().includes(busca) && !v.descricao?.toLowerCase().includes(busca)) return false;
    if (area && v.area !== area) return false;
    if (contrato && v.contrato !== contrato) return false;
    if (modalidade && v.modalidade !== modalidade) return false;
    if (nivel && v.nivel !== nivel) return false;
    if (cidade) {
      if (cidade === 'Remoto') { if (v.modalidade !== 'Remoto') return false; }
      else if (v.cidade && v.cidade !== cidade) return false;
    }
    if (salarioMin && (v.salario_min || 0) < salarioMin) return false;
    if (empresa && v.empresas?.nome !== empresa) return false;
    return true;
  });

  // Ordenação
  if (ordem === 'recente') {
    resultado.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  } else if (ordem === 'salario') {
    resultado.sort((a, b) => (b.salario_min || 0) - (a.salario_min || 0));
  } else {
    resultado.sort((a, b) => (b.destaque ? 1 : 0) - (a.destaque ? 1 : 0) || new Date(b.created_at) - new Date(a.created_at));
  }

  vagasFiltradas = resultado;

  // Atualiza contadores
  const total = resultado.length;
  document.getElementById('header-count').textContent = total + ' vaga' + (total !== 1 ? 's' : '') + ' disponível' + (total !== 1 ? 'eis' : '');
  document.getElementById('results-count').innerHTML = '<strong>' + total + '</strong> vaga' + (total !== 1 ? 's' : '') + ' encontrada' + (total !== 1 ? 's' : '');

  // Filtros ativos
  const tags = [];
  if (busca) tags.push({ label: '"' + busca + '"', campo: 'busca' });
  if (area) tags.push({ label: area, campo: 'area' });
  if (contrato) tags.push({ label: contrato, campo: 'contrato' });
  if (modalidade) tags.push({ label: modalidade, campo: 'modalidade' });
  if (nivel) tags.push({ label: nivel, campo: 'nivel' });
  if (cidade) tags.push({ label: cidade, campo: 'cidade' });
  if (empresa) tags.push({ label: empresa, campo: 'empresa' });
  if (salarioMin) tags.push({ label: 'A partir de R$ ' + salarioMin.toLocaleString('pt-BR'), campo: 'salario' });
  const afEl = document.getElementById('active-filters');
  afEl.innerHTML = tags.map(t => `<span class="active-filter-tag">${t.label}<button onclick="limparCampo('${t.campo}')">×</button></span>`).join('');

  renderPagina();
}

function limparCampo(campo) {
  if (campo === 'busca') document.getElementById('busca-input').value = '';
  else if (campo === 'area') document.getElementById('f-area').value = '';
  else if (campo === 'contrato') document.getElementById('f-contrato').value = '';
  else if (campo === 'modalidade') document.getElementById('f-modalidade').value = '';
  else if (campo === 'nivel') document.getElementById('f-nivel').value = '';
  else if (campo === 'cidade') document.getElementById('f-cidade').value = '';
  else if (campo === 'salario') document.getElementById('f-salario').value = '';
  else if (campo === 'empresa') document.getElementById('f-empresa').value = '';
  paginaAtual = 1;
  aplicarFiltros();
}

function renderPagina() {
  const grid = document.getElementById('jobs-grid');
  const total = vagasFiltradas.length;
  const totalPags = Math.ceil(total / PER_PAGE);

  if (total === 0) {
    grid.innerHTML = '<div class="jobs-empty"><p>🔍</p><h3>Nenhuma vaga encontrada</h3><p style="font-size:0.88rem">Tente outros filtros ou limpe a busca.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const inicio = (paginaAtual - 1) * PER_PAGE;
  const fim = Math.min(inicio + PER_PAGE, total);
  const pagina = vagasFiltradas.slice(inicio, fim);

  grid.innerHTML = pagina.map(v => renderVaga(v)).join('');
  renderPaginacao(totalPags);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPaginacao(totalPags) {
  const el = document.getElementById('pagination');
  if (totalPags <= 1) { el.innerHTML = ''; return; }

  let html = '';
  html += `<button class="pag-btn pag-arrow" onclick="irPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>‹</button>`;

  for (let i = 1; i <= totalPags; i++) {
    if (i === 1 || i === totalPags || (i >= paginaAtual - 2 && i <= paginaAtual + 2)) {
      html += `<button class="pag-btn ${i === paginaAtual ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
    } else if (i === paginaAtual - 3 || i === paginaAtual + 3) {
      html += `<span style="padding:0 4px;color:var(--ink-3)">…</span>`;
    }
  }

  html += `<button class="pag-btn pag-arrow" onclick="irPagina(${paginaAtual + 1})" ${paginaAtual === totalPags ? 'disabled' : ''}>›</button>`;
  el.innerHTML = html;
}

function irPagina(n) {
  const totalPags = Math.ceil(vagasFiltradas.length / PER_PAGE);
  if (n < 1 || n > totalPags) return;
  paginaAtual = n;
  renderPagina();
}

function renderVaga(v) {
  const iniciais = v.titulo ? v.titulo.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase() : 'VG';
  const empLogo = v.empresas?.logo;
  const logoHtml = empLogo
    ? `<div class="company-avatar"><img src="${empLogo}" alt="${v.empresas?.nome || ''}" /></div>`
    : `<div class="company-avatar">${iniciais}</div>`;
  const salario = v.salario_min && v.salario_max && v.salario_min !== v.salario_max
    ? `R$ ${Number(v.salario_min).toLocaleString('pt-BR')} – R$ ${Number(v.salario_max).toLocaleString('pt-BR')}`
    : v.salario_min ? `R$ ${Number(v.salario_min).toLocaleString('pt-BR')}` : 'A combinar';
  const badge = v.destaque ? `<span class="badge badge-featured">⭐ Destaque</span>` : `<span class="badge badge-new">Nova</span>`;
  const tempo = tempoRelativo(v.created_at);
  const tags = [v.modalidade, v.contrato, v.nivel].filter(Boolean);
  return `
    <div class="job-card${v.destaque ? ' featured' : ''}" onclick="abrirVaga('${v.id}')">
      <div class="job-top">
        ${logoHtml}
        ${badge}
      </div>
      <div class="job-title">${v.titulo || ''}</div>
      <div class="job-company">${v.empresas?.nome || ''} · ${v.cidade || 'Bauru'}, SP</div>
      <div class="job-tags">${tags.map(t => `<span class="job-tag">${t}</span>`).join('')}${v.area ? `<span class="job-tag" style="color:var(--accent)">${v.area}</span>` : ''}</div>
      <div class="job-footer">
        <span class="job-salary">${salario}</span>
        <span class="job-ago">${tempo}</span>
      </div>
    </div>`;
}

function abrirVaga(id) {
  window.location.href = `oportunia-vaga-integrado.html?id=${id}`;
}

function tempoRelativo(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 60000);
  if (diff < 2) return 'agora';
  if (diff < 60) return `há ${diff} min`;
  const h = Math.floor(diff / 60);
  if (h < 24) return `há ${h}h`;
  const dias = Math.floor(h / 24);
  if (dias === 1) return 'há 1 dia';
  if (dias < 30) return `há ${dias} dias`;
  return `há ${Math.floor(dias / 30)} meses`;
}

// Inicialização
lerUrlParams();
carregarVagas();
</script>
